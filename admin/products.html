<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products | Apiaro Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-hard-hat"></i>
                    <span>APIARO</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a></li>
                    <li><a href="projects.html"><i class="fas fa-building"></i><span>Projects</span></a></li>
                    <li class="active"><a href="products.html"><i class="fas fa-boxes"></i><span>Products</span></a></li>
                    <li><a href="orders.html"><i class="fas fa-shopping-cart"></i><span>Orders</span></a></li>
                    <li><a href="messages.html"><i class="fas fa-envelope"></i><span>Messages</span></a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
            </div>
        </aside>

        <main class="main-content">
            <header class="admin-header">
                <h2>Manage Products</h2>
                <button class="btn btn-primary" onclick="openModal()">
                    <i class="fas fa-plus"></i> Add Product
                </button>
            </header>

            <div class="content-body">
                <div class="table-card">
                    <div class="table-header">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
                        </div>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Image</th>
                                    <th>Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Stock</th>
                                    <th>Featured</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="productsTable">
                                <tr><td colspan="7" class="text-center">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Product</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select id="productCategory" required>
                        <option value="cement">Cement & Concrete</option>
                        <option value="steel">Steel & Metals</option>
                        <option value="timber">Timber & Wood</option>
                        <option value="roofing">Roofing Materials</option>
                        <option value="aggregate">Aggregates & Sand</option>
                        <option value="plumbing">Plumbing</option>
                        <option value="electrical">Electrical</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Price (Ksh) *</label>
                        <input type="number" id="productPrice" required>
                    </div>
                    <div class="form-group">
                        <label>Stock Quantity *</label>
                        <input type="number" id="productStock" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Unit</label>
                    <input type="text" id="productUnit" placeholder="e.g., bag, piece, kg">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="productDescription" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Product Image</label>
                    <input type="file" id="productImage" name="images" accept="image/*">
                    <div id="imagePreview" class="image-preview"></div>
                </div>
                <div class="form-group checkbox">
                    <label>
                        <input type="checkbox" id="productFeatured">
                        <span>Featured Product</span>
                    </label>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script>
        let allProducts = [];
        
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadProducts();
        });
        
        async function loadProducts() {
            try {
                allProducts = await api.getProducts();
                console.log('Products loaded:', allProducts);
                displayProducts(allProducts);
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsTable').innerHTML = 
                    '<tr><td colspan="7" class="text-center text-red">Error loading products</td></tr>';
            }
        }
        
        function displayProducts(products) {
            const tbody = document.getElementById('productsTable');
            
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">No products found</td></tr>';
                return;
            }
            
            tbody.innerHTML = products.map(product => {
                const imageUrl = product.image_url || product.image || 'https://via.placeholder.com/50';
                
                return `
                <tr>
                    <td>
                        <img src="${imageUrl}" alt="${product.name}" class="table-img" onerror="this.src='https://via.placeholder.com/50'">
                    </td>
                    <td>${product.name}</td>
                    <td><span class="badge badge-info">${product.category}</span></td>
                    <td>Ksh ${parseFloat(product.price).toLocaleString()}</td>
                    <td>${product.stock} ${product.unit || ''}</td>
                    <td>${product.featured ? '<i class="fas fa-check text-success"></i>' : '-'}</td>
                    <td class="actions">
                        <button class="btn-icon edit" onclick="editProduct(${product.id})" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn-icon delete" onclick="deleteProduct(${product.id})" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `}).join('');
        }
        
        function searchProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name.toLowerCase().includes(searchTerm) || 
                p.category.toLowerCase().includes(searchTerm)
            );
            displayProducts(filtered);
        }
        
        function openModal() {
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('modalTitle').textContent = 'Add New Product';
            document.getElementById('productModal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }
        
        async function editProduct(id) {
            try {
                const product = await api.getProduct(id);
                document.getElementById('productId').value = product.id;
                document.getElementById('productName').value = product.name;
                document.getElementById('productCategory').value = product.category;
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productStock').value = product.stock;
                document.getElementById('productUnit').value = product.unit || '';
                document.getElementById('productDescription').value = product.description || '';
                document.getElementById('productFeatured').checked = product.featured;
                
                document.getElementById('modalTitle').textContent = 'Edit Product';
                document.getElementById('productModal').style.display = 'block';
            } catch (error) {
                alert('Error loading product details: ' + error.message);
            }
        }
        
        async function saveProduct(e) {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            
            const formData = new FormData();
            formData.append('name', document.getElementById('productName').value);
            formData.append('category', document.getElementById('productCategory').value);
            formData.append('price', document.getElementById('productPrice').value);
            formData.append('stock', document.getElementById('productStock').value);
            formData.append('unit', document.getElementById('productUnit').value);
            formData.append('description', document.getElementById('productDescription').value);
            formData.append('featured', document.getElementById('productFeatured').checked);
            
            const fileInput = document.getElementById('productImage');
            if (fileInput.files.length > 0) {
                formData.append('images', fileInput.files[0]);
                console.log('Adding image to form data:', fileInput.files[0].name);
            }
            
            try {
                if (id) {
                    await api.updateProduct(id, formData);
                } else {
                    await api.createProduct(formData);
                }
                closeModal();
                loadProducts();
                alert('Product saved successfully!');
            } catch (error) {
                alert('Error saving product: ' + error.message);
            }
        }
        
        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;
            
            try {
                await api.deleteProduct(id);
                loadProducts();
                alert('Product deleted successfully!');
            } catch (error) {
                alert('Error deleting product: ' + error.message);
            }
        }
    </script>
</body>
</html>
