<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Apiaro Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-hard-hat"></i>
                    <span>APIARO</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a></li>
                    <li><a href="projects.html"><i class="fas fa-building"></i><span>Projects</span></a></li>
                    <li><a href="products.html"><i class="fas fa-boxes"></i><span>Products</span></a></li>
                    <li><a href="orders.html"><i class="fas fa-shopping-cart"></i><span>Orders</span></a></li>
                    <li class="active"><a href="messages.html"><i class="fas fa-envelope"></i><span>Messages</span></a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
            </div>
        </aside>

        <main class="main-content">
            <header class="admin-header">
                <h2>Customer Messages</h2>
            </header>

            <div class="content-body">
                <div class="messages-container" id="messagesContainer">
                    <p class="text-center">Loading messages...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Message Detail Modal -->
    <div id="messageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Message Details</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="message-detail" id="messageDetail">
                <!-- Content loaded dynamically -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Close</button>
                <button type="button" class="btn btn-primary" id="markReadBtn" onclick="markAsRead()">
                    <i class="fas fa-check"></i> Mark as Read
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts - ONLY 2 files, NO frontend/api.js -->
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script>
        let currentMessageId = null;
        let allMessages = [];
        
        document.addEventListener('DOMContentLoaded', async function() {
            await checkAuth();
            await loadMessages();
        });
        
        async function loadMessages() {
            try {
                console.log('📥 Loading messages...');
                allMessages = await api.getMessages();
                console.log('✅ Messages loaded:', allMessages.length);
                displayMessages(allMessages);
            } catch (error) {
                console.error('❌ Error loading messages:', error);
                document.getElementById('messagesContainer').innerHTML = 
                    '<p class="text-center error">Failed to load messages. Please refresh.</p>';
            }
        }
        
        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            
            if (!messages || messages.length === 0) {
                container.innerHTML = '<p class="text-center">No messages found</p>';
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message-card ${msg.is_read ? 'read' : 'unread'}" onclick="viewMessage(${msg.id})">
                    <div class="message-header">
                        <div class="message-sender">
                            <i class="fas fa-user-circle"></i>
                            <div>
                                <h4>${escapeHtml(msg.name)}</h4>
                                <span>${escapeHtml(msg.email)}</span>
                            </div>
                        </div>
                        <div class="message-meta">
                            <span class="message-date">${formatDate(msg.created_at)}</span>
                            ${!msg.is_read ? '<span class="badge badge-new">New</span>' : ''}
                        </div>
                    </div>
                    <div class="message-preview">
                        <p><strong>${escapeHtml(msg.subject || 'No subject')}</strong></p>
                        <span>${escapeHtml(msg.message.substring(0, 100))}${msg.message.length > 100 ? '...' : ''}</span>
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatDate(dateString) {
            if (!dateString) return 'Unknown date';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric', 
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        async function viewMessage(id) {
            currentMessageId = id;
            const message = allMessages.find(m => m.id === id);
            
            if (!message) {
                console.error('Message not found:', id);
                return;
            }
            
            const detailDiv = document.getElementById('messageDetail');
            detailDiv.innerHTML = `
                <div class="message-full-header">
                    <div class="sender-info">
                        <i class="fas fa-user-circle fa-3x"></i>
                        <div>
                            <h3>${escapeHtml(message.name)}</h3>
                            <p><i class="fas fa-envelope"></i> ${escapeHtml(message.email)}</p>
                            ${message.phone ? `<p><i class="fas fa-phone"></i> ${escapeHtml(message.phone)}</p>` : ''}
                        </div>
                    </div>
                    <div class="message-timestamp">
                        <p><i class="fas fa-clock"></i> ${formatDate(message.created_at)}</p>
                        <span class="status-badge ${message.is_read ? 'read' : 'unread'}">
                            ${message.is_read ? 'Read' : 'Unread'}
                        </span>
                    </div>
                </div>
                <div class="message-subject">
                    <strong>Subject:</strong> ${escapeHtml(message.subject || 'No subject')}
                </div>
                <div class="message-body">
                    ${escapeHtml(message.message).replace(/\n/g, '<br>')}
                </div>
            `;
            
            const markReadBtn = document.getElementById('markReadBtn');
            if (message.is_read) {
                markReadBtn.style.display = 'none';
            } else {
                markReadBtn.style.display = 'inline-flex';
            }
            
            document.getElementById('messageModal').style.display = 'block';
        }
        
        async function markAsRead() {
            if (!currentMessageId) return;
            
            try {
                console.log('✉️ Marking message as read:', currentMessageId);
                await api.markMessageAsRead(currentMessageId);
                
                const message = allMessages.find(m => m.id === currentMessageId);
                if (message) {
                    message.is_read = true;
                }
                
                displayMessages(allMessages);
                document.getElementById('markReadBtn').style.display = 'none';
                showNotification('Message marked as read', 'success');
                
            } catch (error) {
                console.error('❌ Error marking as read:', error);
                showNotification('Failed to mark as read', 'error');
            }
        }
        
        async function deleteMessage(id) {
            if (!confirm('Are you sure you want to delete this message?')) return;
            
            try {
                console.log('🗑️ Deleting message:', id);
                await api.deleteMessage(id);
                
                allMessages = allMessages.filter(m => m.id !== id);
                displayMessages(allMessages);
                
                closeModal();
                showNotification('Message deleted', 'success');
                
            } catch (error) {
                console.error('❌ Error deleting message:', error);
                showNotification('Failed to delete message', 'error');
            }
        }
        
        function closeModal() {
            document.getElementById('messageModal').style.display = 'none';
            currentMessageId = null;
        }
    </script>
</body>
</html>
